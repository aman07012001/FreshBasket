name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        env:
          MONGO_INITDB_DATABASE: grocery_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo --eval 'db.adminCommand(\"ismaster\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd backend && npm ci
        cd ../grocery && npm ci

    - name: Install Playwright browsers
      run: npx playwright install

    - name: Start backend server
      run: |
        cd backend
        npm run dev &
        cd ..
      env:
        NODE_ENV: test
        PORT: 5000
        MONGO_URL: mongodb://localhost:27017/grocery_test
        JWT_SECRET: test-jwt-secret-key
        EMAIL_HOST: smtp.ethereal.email
        EMAIL_PORT: 587
        EMAIL_USER: test@example.com
        EMAIL_PASS: test-password

    - name: Wait for backend
      run: npx wait-on http://localhost:5000 --timeout 60000

    - name: Start frontend server
      run: |
        cd grocery
        npm run dev &
        cd ..
      env:
        VITE_API_BASE_URL: http://localhost:5000

    - name: Wait for frontend
      run: npx wait-on http://localhost:5173 --timeout 60000

    - name: Run E2E tests
      run: npm run test:e2e
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          test-results/
          playwright-report/
        retention-days: 30

    - name: Upload videos
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-videos
        path: |
          test-results/**/*.avi
          test-results/**/*.webm
        retention-days: 7

    - name: Upload traces
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-traces
        path: test-results/**/*.zip
        retention-days: 7

    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-screenshots
        path: test-results/**/*.png
        retention-days: 7

  cross-browser-tests:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    needs: e2e-tests
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chromium, firefox, webkit]
        # Only run on specific conditions to save resources
        include:
          - os: ubuntu-latest
            browser: chromium
          - os: ubuntu-latest
            browser: firefox
          - os: ubuntu-latest
            browser: webkit
          - os: windows-latest
            browser: chromium
          - os: macos-latest
            browser: chromium

    services:
      mongodb:
        image: mongo:6.0
        env:
          MONGO_INITDB_DATABASE: grocery_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo --eval 'db.adminCommand(\"ismaster\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd backend && npm ci
        cd ../grocery && npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Start backend server
      run: |
        cd backend
        npm run dev &
        cd ..
      env:
        NODE_ENV: test
        PORT: 5000
        MONGO_URL: mongodb://localhost:27017/grocery_test
        JWT_SECRET: test-jwt-secret-key
        EMAIL_HOST: smtp.ethereal.email
        EMAIL_PORT: 587
        EMAIL_USER: test@example.com
        EMAIL_PASS: test-password

    - name: Wait for backend
      run: npx wait-on http://localhost:5000 --timeout 60000

    - name: Start frontend server
      run: |
        cd grocery
        npm run dev &
        cd ..
      env:
        VITE_API_BASE_URL: http://localhost:5000

    - name: Wait for frontend
      run: npx wait-on http://localhost:5173 --timeout 60000

    - name: Run E2E tests on ${{ matrix.browser }} (${{ matrix.os }})
      run: npx playwright test --project=${{ matrix.browser }}
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.browser }}
        path: |
          test-results/
          playwright-report/
        retention-days: 30

  performance-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: e2e-tests
    
    services:
      mongodb:
        image: mongo:6.0
        env:
          MONGO_INITDB_DATABASE: grocery_test
        ports:
          - 27017:27017

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd backend && npm ci
        cd ../grocery && npm ci

    - name: Install Playwright browsers
      run: npx playwright install

    - name: Start backend server
      run: |
        cd backend
        npm run dev &
        cd ..
      env:
        NODE_ENV: test
        PORT: 5000
        MONGO_URL: mongodb://localhost:27017/grocery_test
        JWT_SECRET: test-jwt-secret-key

    - name: Wait for backend
      run: npx wait-on http://localhost:5000 --timeout 60000

    - name: Start frontend server
      run: |
        cd grocery
        npm run dev &
        cd ..
      env:
        VITE_API_BASE_URL: http://localhost:5000

    - name: Wait for frontend
      run: npx wait-on http://localhost:5173 --timeout 60000

    - name: Run performance tests
      run: npx playwright test e2e-tests/cross-platform.e2e.spec.js --grep "Performance"
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-results
        path: test-results/
        retention-days: 30

  accessibility-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: e2e-tests
    
    services:
      mongodb:
        image: mongo:6.0
        env:
          MONGO_INITDB_DATABASE: grocery_test
        ports:
          - 27017:27017

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd backend && npm ci
        cd ../grocery && npm ci

    - name: Install Playwright browsers
      run: npx playwright install

    - name: Start backend server
      run: |
        cd backend
        npm run dev &
        cd ..
      env:
        NODE_ENV: test
        PORT: 5000
        MONGO_URL: mongodb://localhost:27017/grocery_test
        JWT_SECRET: test-jwt-secret-key

    - name: Wait for backend
      run: npx wait-on http://localhost:5000 --timeout 60000

    - name: Start frontend server
      run: |
        cd grocery
        npm run dev &
        cd ..
      env:
        VITE_API_BASE_URL: http://localhost:5000

    - name: Wait for frontend
      run: npx wait-on http://localhost:5173 --timeout 60000

    - name: Run accessibility tests
      run: npx playwright test e2e-tests/cross-platform.e2e.spec.js --grep "Accessibility"
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload accessibility results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: accessibility-results
        path: test-results/
        retention-days: 30